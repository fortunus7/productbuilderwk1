<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Face Test (Dog vs Cat)</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <button id="theme-toggle">🌙 Dark Mode</button>
    <div class="container">
        <h1>Animal Face Test</h1>
        <p class="subtitle">Are you a Dog or a Cat face?</p>
        
        <div id="upload-area">
            <input type="file" id="image-input" accept="image/*" hidden>
            <label for="image-input" id="upload-label">
                <div class="upload-icon">📸</div>
                <span>Click to upload your photo</span>
            </label>
        </div>

        <div id="preview-container" style="display: none;">
            <img id="face-image" src="" alt="your face">
            <div id="loading" style="display: none;">Analyzing...</div>
            <div id="result-container"></div>
        </div>

        <button id="retry-btn" style="display: none;">Try Again</button>
        
        <hr class="divider">
        
        <div class="contact-section">
            <h3>Partnership Inquiry</h3>
            <form action="https://formspree.io/f/mdalplal" method="POST" id="contact-form">
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="How can we help you?" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>

        <hr class="divider">

        <div id="disqus_thread"></div>
        <script>
            /**
            *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
            *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */

            this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
            this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
            };

            var d = document, s = d.createElement('script');
            s.src = 'https://tyches-1.disqus.com/embed.js';

            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>
    <script src="main.js"></script>
</body>
</html>
